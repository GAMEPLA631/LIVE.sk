<!DOCTYPE html>
<html lang="sk" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloopTube | Live Streaming Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --kick-green: #53fc18;
            --kick-black: #0b0e11;
            --kick-grey: #191b1f;
            --kick-hover: #212429;
        }

        body {
            background-color: var(--kick-black);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            user-select: none;
        }

        .sidebar {
            background-color: var(--kick-grey);
            height: calc(100vh - 64px);
        }

        .btn-primary {
            background-color: var(--kick-green);
            color: black;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .video-card:hover .play-overlay {
            opacity: 1;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        .player-frame {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #2d2d2d;
        }

        .player-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #banOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Anti-Cheat Ban Screen -->
    <div id="banOverlay">
        <i class="fas fa-user-slash text-red-600 text-8xl mb-6 animate-pulse"></i>
        <h1 class="text-5xl font-black text-white mb-2 tracking-tighter">CLOOPSHIELD BAN</h1>
        <p id="banMessage" class="text-gray-400 max-w-lg px-4 text-center">Prístup bol zablokovaný systémom automatickej detekcie.</p>
        
        <div id="appealContainer" class="mt-8 flex flex-col items-center">
            <div id="appealStatus" class="text-yellow-500 font-mono text-sm mb-4"></div>
            <button id="appealBtn" onclick="submitAppeal()" class="bg-white/10 hover:bg-white/20 text-white px-8 py-3 rounded-lg text-sm font-bold border border-white/20 transition">ODVOLAŤ SA PROTI BANU</button>
        </div>

        <div class="mt-8 p-4 bg-red-900/10 border border-red-500/30 rounded-lg text-[10px] font-mono text-red-400 uppercase">
            CASE_ID: <span id="banIdDisplay"></span> | STATUS: <span id="banStatusText">TERMINATED</span>
        </div>
        <button onclick="location.reload()" class="mt-12 text-gray-500 hover:text-white text-xs underline">REŠTARTOVAŤ</button>
    </div>

    <!-- Navigácia -->
    <nav class="h-16 border-b border-gray-800 flex items-center justify-between px-6 sticky top-0 z-50 bg-[#0b0e11]">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-black text-[#53fc18] tracking-tighter cursor-pointer" onclick="showSection('home')">CLOOPTUBE</h1>
            <div class="hidden md:flex gap-6 text-sm font-semibold text-gray-400">
                <a href="#" class="hover:text-white" onclick="showSection('home')">Domov</a>
                <a href="#" class="hover:text-white" onclick="showSection('home')">Prehliadať</a>
            </div>
        </div>

        <div class="flex-1 max-w-xl px-4">
            <form onsubmit="event.preventDefault(); searchLiveStreams();" class="relative">
                <input type="text" id="searchInput" placeholder="Hľadať live streamy..." class="w-full bg-[#1e2024] border-none rounded-md py-2 px-4 focus:ring-1 focus:ring-[#53fc18] text-sm outline-none">
                <button type="submit" class="absolute right-3 top-2 text-gray-400 hover:text-white">
                    <i class="fas fa-search"></i>
                </button>
            </form>
        </div>

        <div class="flex items-center gap-4">
            <button onclick="openSettings()" class="text-gray-400 hover:text-white"><i class="fas fa-cog text-xl"></i></button>
            <div id="authStatus"></div>
        </div>
    </nav>

    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-64 sidebar hidden lg:flex flex-col p-4 sticky top-16">
            <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-4">Kategórie</h3>
            <div class="space-y-1 mb-8">
                <button onclick="searchByCategory('Gaming')" class="w-full flex items-center gap-3 p-2 hover:bg-[#212429] rounded transition text-sm">
                    <i class="fas fa-gamepad text-[#53fc18]"></i> Gaming
                </button>
                <button onclick="searchByCategory('Minecraft')" class="w-full flex items-center gap-3 p-2 hover:bg-[#212429] rounded transition text-sm">
                    <i class="fas fa-cube text-[#53fc18]"></i> Minecraft
                </button>
                <button onclick="searchByCategory('Music')" class="w-full flex items-center gap-3 p-2 hover:bg-[#212429] rounded transition text-sm">
                    <i class="fas fa-music text-[#53fc18]"></i> Hudba
                </button>
                <button onclick="searchByCategory('Just Chatting')" class="w-full flex items-center gap-3 p-2 hover:bg-[#212429] rounded transition text-sm">
                    <i class="fas fa-comments text-[#53fc18]"></i> Pokec
                </button>
            </div>
            
            <div class="mt-auto p-4 bg-black/40 rounded-lg border border-gray-800">
                <div id="shieldStatus" class="flex items-center gap-2 text-[10px] font-bold text-green-500">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    SHIELD V4.1 AKTÍVNY
                </div>
            </div>
        </aside>

        <!-- Hlavný obsah -->
        <main class="flex-1 min-h-screen p-6" id="mainContent">
            <section id="homeSection">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Živé prenosy</h2>
                    <button onclick="loadHomeStreams()" class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1.5 rounded-lg">
                        <i class="fas fa-sync-alt mr-2"></i>Obnoviť
                    </button>
                </div>
                <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <div class="col-span-full py-20 text-center text-gray-600">
                        <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
                        <p>Načítavam algoritmus...</p>
                    </div>
                </div>
            </section>

            <section id="playerSection" class="hidden">
                <div class="flex flex-col xl:flex-row gap-6">
                    <div class="flex-1">
                        <div class="player-frame">
                            <div id="customPlayer" class="player-container"></div>
                        </div>
                        <div class="mt-4 bg-[#191b1f] p-6 rounded-xl border border-gray-800">
                            <h1 id="streamTitle" class="text-xl font-bold mb-2">Názov streamu</h1>
                            <p id="channelName" class="text-[#53fc18] font-bold">Kanál</p>
                        </div>
                    </div>
                    <!-- Chat -->
                    <div class="w-full xl:w-80 bg-[#191b1f] rounded-xl border border-gray-800 flex flex-col h-[600px]">
                        <div class="p-4 border-b border-gray-800 font-bold text-xs uppercase tracking-widest text-gray-400">Stream Chat</div>
                        <div id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-3 text-sm custom-scrollbar"></div>
                        <div class="p-4 border-t border-gray-800">
                            <input type="text" id="chatInput" onkeydown="if(event.key==='Enter') sendChatMessage()" placeholder="Napíš správu..." class="w-full bg-[#0b0e11] border border-gray-700 rounded-lg py-2 px-3 text-sm outline-none focus:border-[#53fc18]">
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Auth Modal -->
    <div id="authModal" class="fixed inset-0 bg-black/90 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[#191b1f] w-full max-w-md rounded-2xl p-8 border border-gray-800">
            <h2 id="authTitle" class="text-2xl font-black mb-6 text-center">Prihlásenie</h2>
            <div class="space-y-4">
                <input type="text" id="authUser" placeholder="Meno" class="w-full bg-[#0b0e11] border border-gray-800 rounded-xl py-3 px-4 text-sm outline-none focus:border-[#53fc18]">
                <input type="password" id="authPass" placeholder="Heslo" class="w-full bg-[#0b0e11] border border-gray-800 rounded-xl py-3 px-4 text-sm outline-none focus:border-[#53fc18]">
                <button id="authSubmit" class="btn-primary w-full py-3 rounded-xl mt-2">Vstúpiť</button>
                <p id="authToggle" class="text-center text-xs text-gray-500 cursor-pointer hover:text-white mt-4 underline">Ešte nemáš účet? Registruj sa</p>
                <button onclick="closeAuth()" class="w-full text-xs text-gray-600 mt-2">Zavrieť</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black/90 z-[100] hidden items-center justify-center p-4">
        <div class="bg-[#191b1f] w-full max-w-md rounded-2xl p-8 border border-gray-800">
            <h2 class="text-2xl font-black mb-6">YouTube API</h2>
            <input type="password" id="apiKeyInput" placeholder="Vlož svoj API kľúč" class="w-full bg-[#0b0e11] border border-gray-800 rounded-xl py-4 px-5 mb-6 text-sm outline-none">
            <button onclick="saveSettings()" class="btn-primary w-full py-4 rounded-xl">Uložiť</button>
            <button onclick="closeSettings()" class="w-full py-2 text-sm text-gray-500 mt-4 font-bold">Zrušiť</button>
        </div>
    </div>

    <script>
        const DB_NAME = 'CloopTube_Data';
        const STORES = { settings: 'settings', users: 'users' };
        let db, API_KEY = '', currentUser = null, isRegisterMode = false;

        // --- ANTI-CHEAT ---
        const AntiCheat = {
            isBanned: false,
            init() {
                window.addEventListener('keydown', (e) => {
                    if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74))) this.trigger('DEV_TOOLS');
                });
            },
            async trigger(reason) {
                if (this.isBanned) return;
                this.isBanned = true;
                if (currentUser) {
                    const tx = db.transaction([STORES.users], 'readwrite');
                    const store = tx.objectStore(STORES.users);
                    store.get(currentUser).onsuccess = (e) => {
                        const data = e.target.result;
                        if (data && data.protectionUntil > Date.now()) { this.isBanned = false; return; }
                        if (data) { data.banned = true; store.put(data); showBan(currentUser); }
                    };
                } else showBan("GUEST");
            }
        };

        // --- DATABASE & AUTH ---
        const initDB = () => {
            return new Promise((resolve) => {
                const req = indexedDB.open(DB_NAME, 3);
                req.onupgradeneeded = (e) => {
                    const d = e.target.result;
                    if (!d.objectStoreNames.contains(STORES.settings)) d.createObjectStore(STORES.settings);
                    if (!d.objectStoreNames.contains(STORES.users)) d.createObjectStore(STORES.users, { keyPath: 'username' });
                };
                req.onsuccess = (e) => { db = e.target.result; resolve(); };
            });
        };

        const updateAuthUI = () => {
            const container = document.getElementById('authStatus');
            if (currentUser) {
                container.innerHTML = `<div class="flex items-center gap-3"><span class="text-sm font-bold text-[#53fc18]">${currentUser}</span><button onclick="logout()" class="text-xs text-gray-500 hover:text-white">Odhlásiť</button></div>`;
            } else {
                container.innerHTML = `<button onclick="openAuth('login')" class="btn-primary text-sm px-4 py-2 rounded">Prihlásiť</button>`;
            }
        };

        const openAuth = (mode = 'login') => {
            isRegisterMode = mode === 'register';
            document.getElementById('authTitle').innerText = isRegisterMode ? 'Registrácia' : 'Prihlásenie';
            document.getElementById('authSubmit').innerText = isRegisterMode ? 'Vytvoriť účet' : 'Prihlásiť sa';
            document.getElementById('authToggle').innerText = isRegisterMode ? 'Už máš účet? Prihlás sa' : 'Ešte nemáš účet? Registruj sa';
            document.getElementById('authModal').classList.remove('hidden');
            document.getElementById('authModal').classList.add('flex');
        };

        const closeAuth = () => document.getElementById('authModal').classList.add('hidden');
        document.getElementById('authToggle').onclick = () => openAuth(isRegisterMode ? 'login' : 'register');

        document.getElementById('authSubmit').onclick = () => {
            const user = document.getElementById('authUser').value.trim();
            const pass = document.getElementById('authPass').value.trim();
            if (!user || !pass) return;

            const tx = db.transaction([STORES.users], 'readwrite');
            const store = tx.objectStore(STORES.users);

            if (isRegisterMode) {
                store.get(user).onsuccess = (e) => {
                    if (e.target.result) alert("Meno je obsadené.");
                    else {
                        store.add({ username: user, password: pass, banned: false, appealActive: false, protectionUntil: 0 });
                        currentUser = user; loginSuccess();
                    }
                };
            } else {
                store.get(user).onsuccess = (e) => {
                    const data = e.target.result;
                    if (data && data.password === pass) {
                        if (data.banned) showBan(user);
                        else { currentUser = user; loginSuccess(); }
                    } else alert("Chybné údaje.");
                };
            }
        };

        const loginSuccess = () => {
            localStorage.setItem('cloop_session', currentUser);
            updateAuthUI();
            closeAuth();
            loadHomeStreams();
        };

        const logout = () => { currentUser = null; localStorage.removeItem('cloop_session'); location.reload(); };

        const showBan = (u) => {
            document.getElementById('banIdDisplay').innerText = btoa(u);
            document.getElementById('banOverlay').style.display = 'flex';
        };

        // --- YOUTUBE API ALGORITHM ---
        const loadHomeStreams = async (query = '') => {
            const grid = document.getElementById('videoGrid');
            if (!API_KEY) {
                grid.innerHTML = `<div class="col-span-full py-10 text-center"><p class="text-gray-500">Zadaj API kľúč v nastaveniach.</p></div>`;
                return;
            }

            const searchQuery = query || 'Live Stream Gaming';
            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&eventType=live&maxResults=24&q=${encodeURIComponent(searchQuery)}&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.error) {
                    grid.innerHTML = `<div class="col-span-full text-center text-red-500">Chyba API: ${data.error.message}</div>`;
                    return;
                }
                renderVideos(data.items || []);
            } catch (err) {
                grid.innerHTML = `<div class="col-span-full text-center text-red-500">Chyba pripojenia.</div>`;
            }
        };

        const renderVideos = (items) => {
            const grid = document.getElementById('videoGrid');
            if (!items.length) { grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-500">Nenašli sa žiadne streamy.</div>`; return; }
            
            grid.innerHTML = items.map(v => `
                <div class="video-card cursor-pointer group" onclick="playStream('${v.id.videoId}', '${v.snippet.title.replace(/'/g, "")}', '${v.snippet.channelTitle.replace(/'/g, "")}')">
                    <div class="relative overflow-hidden rounded-xl aspect-video bg-gray-900">
                        <img src="${v.snippet.thumbnails.medium.url}" class="w-full h-full object-cover">
                        <div class="play-overlay absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 transition-opacity">
                            <i class="fas fa-play text-white text-3xl"></i>
                        </div>
                    </div>
                    <div class="mt-2">
                        <p class="text-sm font-bold truncate">${v.snippet.title}</p>
                        <p class="text-xs text-gray-500">${v.snippet.channelTitle}</p>
                    </div>
                </div>
            `).join('');
        };

        const searchLiveStreams = () => {
            const q = document.getElementById('searchInput').value;
            if (q.trim()) { showSection('home'); loadHomeStreams(q); }
        };

        const searchByCategory = (c) => {
            document.getElementById('searchInput').value = c;
            showSection('home');
            loadHomeStreams(c + " Live");
        };

        const playStream = (id, t, c) => {
            showSection('player');
            document.getElementById('streamTitle').innerText = t;
            document.getElementById('channelName').innerText = c;
            document.getElementById('customPlayer').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            document.getElementById('chatBox').innerHTML = `<div class="text-center text-gray-600 text-[10px]">Vitaj v čete ${c}!</div>`;
        };

        const sendChatMessage = () => {
            const inp = document.getElementById('chatInput');
            const box = document.getElementById('chatBox');
            if (!inp.value.trim() || !currentUser) return;
            const div = document.createElement('div');
            div.className = "animate-fade-in";
            div.innerHTML = `<span class="font-bold text-[#53fc18]">${currentUser}:</span> <span class="text-gray-300">${inp.value}</span>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            inp.value = '';
        };

        const showSection = (s) => {
            document.getElementById('homeSection').style.display = s === 'home' ? 'block' : 'none';
            document.getElementById('playerSection').style.display = s === 'player' ? 'block' : 'none';
        };

        const openSettings = () => document.getElementById('settingsModal').classList.remove('hidden');
        const closeSettings = () => document.getElementById('settingsModal').classList.add('hidden');
        const saveSettings = () => {
            const k = document.getElementById('apiKeyInput').value.trim();
            if (k) {
                db.transaction([STORES.settings], 'readwrite').objectStore(STORES.settings).put(k, 'api_key');
                API_KEY = k; closeSettings(); loadHomeStreams();
            }
        };

        window.onload = async () => {
            await initDB();
            AntiCheat.init();
            
            db.transaction([STORES.settings], 'readonly').objectStore(STORES.settings).get('api_key').onsuccess = (e) => {
                if (e.target.result) {
                    API_KEY = e.target.result;
                    document.getElementById('apiKeyInput').value = API_KEY;
                    loadHomeStreams();
                } else openSettings();
            };

            const session = localStorage.getItem('cloop_session');
            if (session) {
                db.transaction([STORES.users], 'readonly').objectStore(STORES.users).get(session).onsuccess = (e) => {
                    const d = e.target.result;
                    if (d && !d.banned) { currentUser = session; updateAuthUI(); }
                    else if (d && d.banned) showBan(session);
                    else updateAuthUI();
                };
            } else updateAuthUI();
        };
    </script>
</body>
</html>
