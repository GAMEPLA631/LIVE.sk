<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KICK PRO - REALTIME P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --kick-green: #05f00a;
            --bg-dark: #06080a;
            --panel-bg: rgba(13, 17, 23, 0.8);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: #ffffff; 
            margin: 0;
            overflow: hidden;
        }

        .glass {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        video {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
        }

        #setup-modal { 
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: var(--kick-green);
            color: #000;
            font-weight: 800;
            transition: all 0.2s;
        }

        .btn-primary:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
        }

        .live-indicator {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .desktop-only { display: none !important; }
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- MODAL PRE VÝBER ROLY -->
    <div id="setup-modal" class="p-4">
        <div class="max-w-md w-full bg-[#111] p-8 rounded-[32px] border border-white/10 text-center">
            <h2 class="text-3xl font-black italic uppercase mb-2">KICK<span class="text-[#05f00a]">PRO</span></h2>
            <p id="device-info" class="text-[10px] tracking-[0.3em] text-gray-500 uppercase mb-8">Inicializácia...</p>

            <div class="space-y-4">
                <!-- Streamer sekcia (iba PC) -->
                <div id="streamer-ui" class="desktop-only border border-white/5 p-6 rounded-2xl bg-white/5">
                    <i class="fa-solid fa-broadcast-tower text-2xl text-[#05f00a] mb-3"></i>
                    <h3 class="font-bold text-sm uppercase mb-4">Vysielať z tohto PC</h3>
                    <button id="btn-start-stream" class="btn-primary w-full py-4 rounded-xl text-xs uppercase tracking-widest">
                        Spustiť Live Stream
                    </button>
                </div>

                <!-- Viewer sekcia (Mobil aj PC) -->
                <div class="border border-white/5 p-6 rounded-2xl bg-white/5">
                    <i class="fa-solid fa-play text-2xl text-blue-500 mb-3"></i>
                    <h3 class="font-bold text-sm uppercase mb-4">Sledovať stream</h3>
                    <input id="input-peer-id" type="text" placeholder="Zadaj ID streamera" 
                        class="w-full bg-black border border-white/10 p-4 rounded-xl mb-4 text-center font-bold text-[#05f00a] uppercase outline-none focus:border-[#05f00a]">
                    <button id="btn-join-stream" class="bg-white text-black font-black w-full py-4 rounded-xl text-xs uppercase tracking-widest">
                        Pripojiť sa
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="h-16 md:h-20 border-b border-white/5 flex items-center justify-between px-4 md:px-10 glass">
        <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-[#05f00a] rounded-lg flex items-center justify-center">
                    <i class="fa-solid fa-bolt text-black text-xs"></i>
                </div>
                <span class="font-black italic uppercase text-lg hidden md:block">KICK<span class="text-[#05f00a]">PRO</span></span>
            </div>
            <div id="live-tag" class="hidden flex items-center space-x-2 bg-red-600 px-3 py-1 rounded-md live-indicator">
                <span class="text-[9px] font-black uppercase">Live</span>
            </div>
        </div>

        <div class="flex-1 max-w-sm mx-4">
            <input id="search-id" type="text" placeholder="Vyhladať ID..." class="w-full bg-white/5 border border-white/10 rounded-xl py-2 px-4 text-xs outline-none focus:border-[#05f00a]">
        </div>

        <div class="flex items-center space-x-4">
            <div id="my-id-container" class="hidden md:flex flex-col items-end">
                <span class="text-[8px] text-gray-500 font-bold uppercase">Tvoje ID</span>
                <span id="display-peer-id" class="text-[#05f00a] font-bold mono text-xs">---</span>
            </div>
            <div class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">
                <i class="fa-solid fa-user text-xs text-gray-400"></i>
            </div>
        </div>
    </header>

    <!-- MAIN VIEW -->
    <main class="flex-1 bg-black relative">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted class="hidden"></video>
        
        <div id="no-signal" class="absolute inset-0 flex flex-center items-center justify-center flex-col text-center p-8">
            <i class="fa-solid fa-signal text-4xl text-gray-800 mb-4"></i>
            <h2 class="text-gray-600 font-black uppercase tracking-widest text-sm">Žiadny signál</h2>
            <p class="text-[10px] text-gray-700 mt-2 uppercase">Zadaj ID a pripoj sa k vysielaniu</p>
        </div>

        <!-- MOBILE STREAM INFO OVERLAY -->
        <div id="mobile-overlay" class="absolute bottom-4 left-4 right-4 md:hidden hidden">
            <div class="glass p-4 rounded-2xl flex items-center justify-between">
                <div>
                    <p id="overlay-title" class="text-xs font-bold">Načítavam stream...</p>
                    <p class="text-[9px] text-gray-400 uppercase">Real-time P2P Link</p>
                </div>
                <div class="bg-red-600 px-2 py-1 rounded text-[8px] font-black uppercase">Live</div>
            </div>
        </div>
    </main>

    <script>
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const peer = new Peer(); // Inicializácia PeerJS bez vlastného ID (necháme vygenerovať)
        
        let localStream;
        const localVideo = document.getElementById('local-video');
        const remoteVideo = document.getElementById('remote-video');
        const setupModal = document.getElementById('setup-modal');
        const noSignal = document.getElementById('no-signal');

        // Nastavenie UI podľa zariadenia
        window.onload = () => {
            const deviceInfo = document.getElementById('device-info');
            if (isMobile) {
                deviceInfo.innerText = "Mobilné zariadenie - Režim Divák";
            } else {
                deviceInfo.innerText = "PC Terminal - Plný prístup";
            }
        };

        // Získanie nášho unikátneho ID
        peer.on('open', (id) => {
            document.getElementById('display-peer-id').innerText = id;
            console.log('Moje Peer ID:', id);
        });

        // --- LOGIKA STREAMERA (PC) ---
        document.getElementById('btn-start-stream').onclick = async () => {
            if (isMobile) return;

            try {
                // Zachytenie obrazovky
                localStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: "always" },
                    audio: true
                });

                localVideo.srcObject = localStream;
                localVideo.classList.remove('hidden');
                remoteVideo.classList.add('hidden'); // Streamer vidí svoje preview v localVideo
                
                enterApp("Broadcasting...");
                document.getElementById('my-id-container').classList.remove('hidden');
                
                // Čakanie na hovory od divákov
                peer.on('call', (call) => {
                    console.log('Prijímam spojenie od diváka...');
                    call.answer(localStream); // Odpovedať so streamom obrazovky
                });

                addLog("Vysielanie spustené. Zdieľaj svoje ID!");
            } catch (err) {
                console.error("Chyba pri štarte streamu:", err);
                alert("Nepodarilo sa spustiť zdieľanie obrazovky.");
            }
        };

        // --- LOGIKA DIVÁKA (PC + Mobil) ---
        const joinStream = (targetId) => {
            if (!targetId) return;
            
            console.log('Pripájanie k:', targetId);
            // Divák "zavolá" streamerovi bez posielania vlastného streamu
            const call = peer.call(targetId, new MediaStream()); 

            call.on('stream', (remoteStream) => {
                console.log('Stream prijatý!');
                remoteVideo.srcObject = remoteStream;
                remoteVideo.classList.remove('hidden');
                noSignal.classList.add('hidden');
                
                if (isMobile) {
                    document.getElementById('mobile-overlay').classList.remove('hidden');
                    document.getElementById('overlay-title').innerText = "Streaming from: " + targetId;
                }
                
                enterApp("Sledujem: " + targetId);
            });

            call.on('error', (err) => {
                alert("Chyba pripojenia. Skontroluj ID.");
                console.error(err);
            });
        };

        document.getElementById('btn-join-stream').onclick = () => {
            const id = document.getElementById('input-peer-id').value.trim();
            joinStream(id);
        };

        document.getElementById('search-id').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinStream(e.target.value.trim());
            }
        });

        function enterApp(statusText) {
            setupModal.style.display = 'none';
            document.getElementById('live-tag').classList.remove('hidden');
        }

        function addLog(msg) {
            console.log("[KICK PRO]", msg);
        }

    </script>
</body>
</html>
